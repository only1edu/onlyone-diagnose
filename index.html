<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VISANG OnlyOne Needs Finder</title>
    <!-- 외부 라이브러리 로드 (React, Tailwind, Babel) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
        
        body { 
            font-family: 'Noto Sans KR', sans-serif; 
            background-color: #f1f5f9; 
            touch-action: manipulation; 
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* 애니메이션 효과 */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        
        /* 버튼 클릭 효과 */
        .btn-active:active { transform: scale(0.96); transition: transform 0.1s; }
        
        /* 커스텀 스크롤바 */
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        /* 이미지 오버레이 */
        .img-overlay {
            background: linear-gradient(to top, rgba(0, 0, 0, 0.8) 0%, rgba(0, 0, 0, 0.4) 60%, transparent 100%);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // 아이콘 실종 문제를 해결하기 위한 인라인 SVG 컴포넌트들
        const Icons = {
            Baby: () => (
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M9 12h.01"/><path d="M15 12h.01"/><path d="M10 16c.5.3 1.2.5 2 .5s1.5-.2 2-.5"/><path d="M19 6.3a9 9 0 0 1 1.8 3.9 2 2 0 0 1 0 3.6 9 9 0 0 1-17.6 0 2 2 0 0 1 0-3.6A9 9 0 0 1 12 3c2 0 3.5 1.1 3.5 2.5s-.9 2.5-2 2.5c-.8 0-1.5-.4-1.5-1"/></svg>
            ),
            Graduation: () => (
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>
            ),
            Home: () => (
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            ),
            ArrowLeft: () => (
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="m12 19-7-7 7-7M19 12H5"/></svg>
            ),
            ChevronRight: () => (
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="m9 18 6-6-6-6"/></svg>
            ),
            Zap: () => (
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M4 14.5 14 3l-2.5 8.5H20L10 21l2.5-8.5H4z"/></svg>
            ),
            Check: () => (
                <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
            )
        };

        const App = () => {
            const [stage, setStage] = useState('select'); // select, concerns, solution, demo, final
            const [category, setCategory] = useState(null); 
            const [selectedConcern, setSelectedConcern] = useState(null);

            const data = {
                kids: {
                    title: "온리원 키즈 (4~7세)",
                    img: "https://images.unsplash.com/photo-1503676260728-1c00da094a0b?auto=format&fit=crop&q=80&w=600",
                    concerns: [
                        { id: 1, text: "한글/수 떼기, 늦어지면 어쩌죠?", sol: "놀이가 공부가 되는 0.1% 메타인지 학습법으로 자연스러운 습득", demo: "태블릿의 [한글 보물찾기] 메뉴를 통해 아이가 직접 놀이하며 글자를 익히는 과정을 보여주세요." },
                        { id: 2, text: "스마트 기기 노출, 중독될까 봐 무서워요.", sol: "학습 전용 모드와 AI 안심 관리 시스템으로 올바른 디지털 습관 형성", demo: "[학습 리포트]와 [안심 잠금] 기능을 시연하여 유해 환경 차단 시스템을 확인시켜주세요." },
                        { id: 3, text: "벌써부터 공부를 지겨워하면 어떡하나요?", sol: "아이의 반응에 즉각 화답하는 인터랙티브 콘텐츠로 '공부 재미' 발견", demo: "[개념 송]과 캐릭터 상호작용 화면을 시연하며 공부가 아닌 놀이로 느끼게 하세요." },
                        { id: 4, text: "초등학교 입학 준비, 무엇을 해야 할까요?", sol: "학교 교과 과정과 100% 연계된 입학 준비 완성 커리큘럼", demo: "[1학년 미리보기] 코너의 교과서 연계 콘텐츠를 실제 교과서와 비교하며 보여주세요." },
                        { id: 5, text: "사고력과 창의력을 어떻게 길러주나요?", sol: "정답만 찾는 공부가 아닌, '왜?'를 생각하게 하는 질문 중심 학습", demo: "[창의 코딩]이나 [사고력 퀴즈] 기능을 통해 아이가 생각하는 힘을 기르는 과정을 보여주세요." }
                    ]
                },
                elementary: {
                    title: "온리원 초등 (8~13세)",
                    img: "https://images.unsplash.com/photo-1434030216411-0b793f4b4173?auto=format&fit=crop&q=80&w=600",
                    concerns: [
                        { id: 1, text: "공부 습관이 안 잡혀서 매일 싸워요.", sol: "매일 30분, 스스로 계획하고 실천하는 AI 코칭 시스템", demo: "[오늘의 학습] 투두리스트와 보상 시스템(별 포인트)을 시연하여 자기주도 습관 형성을 보여주세요." },
                        { id: 2, text: "학원 시간표 채우기에 급급한 느낌이에요.", sol: "학원 뺑뺑이 대신, 부족한 부분만 골라 채우는 고밀도 맞춤 학습", demo: "[취약점 진단] 결과표를 보여주며 전체 공부가 아닌 '모르는 것'만 공부하는 효율성을 강조하세요." },
                        { id: 3, text: "분명히 아는 건데 자꾸 틀려와요.", sol: "‘아는 착각’을 제거하고 메타인지 인출 학습으로 완벽한 이해", demo: "[설명하기] 기능을 통해 아이가 직접 목소리로 녹음하고 AI 피드백을 받는 과정을 시연하세요." },
                        { id: 4, text: "서술형 문제와 독해력을 너무 어려워해요.", sol: "어휘부터 구조까지 짚어주는 문해력 특화 솔루션", demo: "[문해력 특강] 메뉴의 지문 분석 기능과 서술형 첨삭 지도 과정을 시연해 주세요." },
                        { id: 5, text: "학년이 올라갈수록 성적 편차가 심해져요.", sol: "학년별 골든타임을 놓치지 않는 계통 중심 학습 관리", demo: "[수학 계통도]를 펼쳐서 현재 단원이 나중에 어떻게 연결되는지 시각적으로 보여주세요." }
                    ]
                }
            };

            const goBack = () => {
                if (stage === 'concerns') setStage('select');
                else if (stage === 'solution') setStage('concerns');
                else if (stage === 'demo') setStage('solution');
                else if (stage === 'final') setStage('demo');
            };

            const goHome = () => {
                setStage('select');
                setCategory(null);
                setSelectedConcern(null);
            };

            return (
                <div className="flex items-center justify-center min-h-screen p-0 sm:p-4 bg-slate-200">
                    {/* Tablet View Device */}
                    <div className="relative w-full max-w-[480px] h-[100vh] sm:h-[850px] bg-white sm:rounded-[3.5rem] border-0 sm:border-[14px] border-slate-950 shadow-2xl overflow-hidden flex flex-col">
                        
                        {/* 1. 상단 내비게이션 바 */}
                        <div className="pt-10 px-6 flex justify-between items-center bg-white border-b border-slate-100 pb-4 z-50">
                            <div className="flex items-center gap-3">
                                {stage !== 'select' && (
                                    <button onClick={goBack} className="w-10 h-10 flex items-center justify-center rounded-xl bg-slate-50 text-slate-600 btn-active shadow-sm">
                                        <Icons.ArrowLeft />
                                    </button>
                                )}
                                <div className="h-8 flex items-center">
                                    {/* 온리원로고.JPG 반영 */}
                                    <img 
                                        src="온리원로고.JPG" 
                                        alt="VISANG OnlyOne" 
                                        className="h-full object-contain"
                                        onError={(e) => { e.target.style.display='none'; e.target.nextSibling.style.display='block'; }}
                                    />
                                    <span style={{display: 'none'}} className="font-black text-red-600 text-xl tracking-tighter italic">ONLY1</span>
                                </div>
                            </div>
                            <button onClick={goHome} className={`w-10 h-10 flex items-center justify-center rounded-xl btn-active shadow-md ${stage === 'select' ? 'bg-slate-50 text-slate-200' : 'bg-slate-900 text-white'}`}>
                                <Icons.Home />
                            </button>
                        </div>

                        <div className="flex-grow overflow-hidden relative bg-white">
                            
                            {/* STEP 1: 대상 선택 */}
                            {stage === 'select' && (
                                <div className="h-full flex flex-col p-10 justify-center animate-fade-in text-center">
                                    <div className="mb-12">
                                        <div className="inline-block px-4 py-1.5 bg-orange-500 rounded-full text-[10px] font-black text-white tracking-[0.2em] mb-4">CONSULTATION MODE</div>
                                        <h1 className="text-4xl font-black text-slate-900 leading-tight tracking-tighter">
                                            "공부 구경"을 멈추고<br/><span className="text-orange-500 italic">"진짜 공부"</span>를 시작합니다.
                                        </h1>
                                        <p className="mt-4 text-slate-400 font-bold">우리 아이의 연령대를 선택해 주세요.</p>
                                    </div>
                                    <div className="grid grid-cols-1 gap-5">
                                        <button onClick={() => {setCategory('kids'); setStage('concerns');}} className="group flex items-center gap-6 p-8 bg-pink-50 rounded-[2.5rem] border-2 border-transparent hover:border-pink-200 transition-all btn-active text-left shadow-sm">
                                            <div className="w-16 h-16 bg-white rounded-2xl flex items-center justify-center shadow-md text-pink-500"><Icons.Baby /></div>
                                            <div><h3 className="text-2xl font-black text-pink-900 mb-1">온리원 키즈</h3><p className="text-pink-600/70 font-bold text-sm">4세 ~ 7세 (유아/예비초)</p></div>
                                            <div className="ml-auto text-pink-300"><Icons.ChevronRight /></div>
                                        </button>
                                        <button onClick={() => {setCategory('elementary'); setStage('concerns');}} className="group flex items-center gap-6 p-8 bg-blue-50 rounded-[2.5rem] border-2 border-transparent hover:border-blue-200 transition-all btn-active text-left shadow-sm">
                                            <div className="w-16 h-16 bg-white rounded-2xl flex items-center justify-center shadow-md text-blue-600"><Icons.Graduation /></div>
                                            <div><h3 className="text-2xl font-black text-blue-900 mb-1">온리원 초등</h3><p className="text-blue-600/70 font-bold text-sm">8세 ~ 13세 (초등학생)</p></div>
                                            <div className="ml-auto text-blue-300"><Icons.ChevronRight /></div>
                                        </button>
                                    </div>
                                </div>
                            )}

                            {/* STEP 2: 5대 고민 선택 */}
                            {stage === 'concerns' && category && (
                                <div className="h-full flex flex-col animate-fade-in bg-slate-50">
                                    <div className="relative h-60 shrink-0">
                                        <img src={data[category].img} className="w-full h-full object-cover" alt="visual" />
                                        <div className="absolute inset-0 img-overlay flex flex-col justify-end p-8">
                                            <h2 className="text-3xl font-black text-white leading-tight">어머님의 가장 큰<br/>학습 고민은 무엇인가요?</h2>
                                        </div>
                                    </div>
                                    <div className="flex-grow p-6 space-y-3 overflow-y-auto custom-scrollbar">
                                        {data[category].concerns.map((item) => (
                                            <button key={item.id} onClick={() => {setSelectedConcern(item); setStage('solution');}} className="w-full p-5 bg-white border border-slate-100 rounded-3xl text-left flex items-center gap-4 hover:border-orange-300 hover:shadow-lg transition-all group btn-active">
                                                <span className="font-bold text-slate-700 flex-grow leading-snug text-lg">{item.text}</span>
                                                <div className="text-slate-300 group-hover:text-orange-500"><Icons.ChevronRight /></div>
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {/* STEP 3: 솔루션 리빌 */}
                            {stage === 'solution' && selectedConcern && (
                                <div className="h-full flex flex-col bg-slate-950 text-white p-10 text-center justify-center relative overflow-hidden animate-fade-in">
                                    <div className="absolute top-[-10%] right-[-10%] w-80 h-80 bg-orange-600 rounded-full blur-[120px] opacity-30 animate-pulse"></div>
                                    <div className="z-10 bg-white/10 p-7 rounded-[2.5rem] border border-white/20 mb-8 w-fit mx-auto text-yellow-300 shadow-2xl"><Icons.Zap /></div>
                                    <div className="z-10 space-y-8">
                                        <h3 className="text-xl font-bold opacity-60">"{selectedConcern.text}"</h3>
                                        <p className="text-xl font-medium">온리원의 명쾌한 해답은?</p>
                                        <div className="p-8 bg-white text-slate-900 rounded-[3rem] shadow-2xl transform scale-105 border-4 border-orange-500/10">
                                            <p className="text-2xl font-black leading-relaxed text-orange-600">“{selectedConcern.sol}”</p>
                                        </div>
                                        <button onClick={() => setStage('demo')} className="w-full py-6 bg-orange-500 text-white rounded-[2rem] font-black text-xl shadow-2xl flex items-center justify-center gap-2 btn-active mt-8">
                                            상세 시연 포인트 <Icons.ChevronRight />
                                        </button>
                                    </div>
                                </div>
                            )}

                            {/* STEP 4: 상세 시연 가이드 (LP 교육용) */}
                            {stage === 'demo' && selectedConcern && (
                                <div className="h-full flex flex-col p-10 justify-center bg-slate-50 animate-fade-in text-center">
                                    <div className="mb-10">
                                        <span className="text-blue-600 font-black text-xs uppercase tracking-[0.2em] mb-3 block">Expert Demonstration</span>
                                        <h3 className="text-3xl font-black text-slate-800">학습기 시연 가이드</h3>
                                        <p className="text-slate-400 font-bold mt-3 text-sm italic">"어머님께 아래 핵심 기능을 직접 보여주세요"</p>
                                    </div>
                                    <div className="p-10 bg-white rounded-[3rem] border-2 border-blue-200 shadow-xl relative overflow-hidden mb-10">
                                        <div className="absolute top-[-30px] right-[-30px] opacity-5 text-blue-600 rotate-12">
                                            <svg width="150" height="150" viewBox="0 0 24 24" fill="currentColor"><path d="M20 3H4c-1.1 0-2 .9-2 2v11c0 1.1.9 2 2 2h3l-1 1v2h12v-2l-1-1h3c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 13H4V5h16v11z"/></svg>
                                        </div>
                                        <p className="text-xl font-bold text-slate-800 leading-relaxed relative z-10 italic">
                                            “{selectedConcern.demo}”
                                        </p>
                                    </div>
                                    <button onClick={() => setStage('final')} className="w-full py-6 bg-slate-900 text-white rounded-[2rem] font-black text-xl shadow-lg btn-active">상담 확정하기</button>
                                </div>
                            )}

                            {/* STEP 5: 최종 마무리 */}
                            {stage === 'final' && selectedConcern && (
                                <div className="h-full flex flex-col p-10 text-center justify-center bg-white animate-fade-in">
                                    <div className="mb-8 text-green-500">
                                        <div className="w-24 h-24 bg-green-50 rounded-full flex items-center justify-center mx-auto shadow-inner"><Icons.Check /></div>
                                    </div>
                                    <h2 className="text-3xl font-black text-slate-900 mb-4 tracking-tighter italic">어머님의 고민,<br/><span className="text-orange-500">온리원</span>이 해결합니다.</h2>
                                    <div className="space-y-4">
                                        <div className="p-7 bg-slate-50 rounded-[2rem] border-2 border-slate-100 text-left relative overflow-hidden">
                                            <div className="text-[10px] font-black text-slate-400 uppercase mb-2">Prescription Summary</div>
                                            <p className="text-lg font-bold text-slate-800 leading-snug">"{selectedConcern.text}" 해결을 위한<br/><span className="text-orange-600 font-black">맞춤 메타인지 프로세스</span> 설계를 마쳤습니다.</p>
                                        </div>
                                        <button className="w-full py-7 bg-blue-600 text-white rounded-[2.5rem] font-black text-2xl shadow-2xl btn-active mt-4 flex flex-col items-center leading-none">7일 무료 체험 신청</button>
                                    </div>
                                    <p className="mt-8 text-[11px] text-slate-400 font-bold tracking-widest uppercase italic">Powered by VISANG OnlyOne</p>
                                </div>
                            )}
                        </div>

                        {/* 바닥 홈 바 인디케이터 */}
                        <div className="h-10 w-full bg-white flex justify-center items-end pb-4">
                            <div className="w-32 h-1.5 rounded-full bg-slate-200"></div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
